<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Shrew Chat — La Madriguera del Tiempo Real</title>
    
    <!-- PWA & Mobile Web App Meta Tags -->
    <meta name="theme-color" content="#09090b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Shrew Chat" />
    <link rel="apple-touch-icon" href="/shrew_icon.jpg" />
    <link rel="icon" type="image/jpeg" href="/shrew_icon.jpg" />
    
    <!-- Web Manifest -->
    <link rel="manifest" href="/manifest.json" />
  </head>
  <body class="bg-zinc-950 text-white select-none overflow-hidden">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Service Worker Registration Script -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js')
            .then((reg) => {
              console.log('Shrew Chat Service Worker registrado con éxito:', reg.scope);
              
              // Automatically check for service worker updates
              reg.addEventListener('updatefound', () => {
                const newWorker = reg.installing;
                if (newWorker) {
                  newWorker.addEventListener('statechange', () => {
                    if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                      // Trigger custom reload event for smooth auto-updates
                      window.dispatchEvent(new CustomEvent('shrew-app-update'));
                    }
                  });
                }
              });
            })
            .catch((err) => {
              console.error('Error al registrar el Service Worker:', err);
            });
        });
      }
    </script>
  </body>
</html>
